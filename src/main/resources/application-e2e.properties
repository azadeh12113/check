#E2E profile: real MySQL 

#Spring Boot server port--E2E profile
server.port=${SERVER_PORT:8080}

#MySQL container--E2E profile
spring.datasource.url=${E2E_DB_URL}
spring.datasource.username=${E2E_DB_USER}
spring.datasource.password=${E2E_DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=false

spring.jpa.open-in-view=false

# External scoring service disabled by default
scoring.base-url=
