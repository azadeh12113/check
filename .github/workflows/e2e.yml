name: E2E Tests

on:
  pull_request:
  push:

jobs:
  e2e:
    runs-on: ubuntu-latest

    env:
      E2E_DB_URL: ${{ secrets.E2E_DB_URL }}
      E2E_DB_USER: ${{ secrets.E2E_DB_USER }}
      E2E_DB_PASS: ${{ secrets.E2E_DB_PASS }}
      MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
      MYSQL_USER: ${{ secrets.MYSQL_USER }}
      MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
      MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Check env presence
        run: |
          test -n "$MYSQL_ROOT_PASSWORD" && echo "MYSQL_ROOT_PASSWORD set" || (echo "MYSQL_ROOT_PASSWORD missing" && exit 1)
          test -n "$MYSQL_DATABASE" && echo "MYSQL_DATABASE set" || (echo "MYSQL_DATABASE missing" && exit 1)
          test -n "$E2E_DB_URL" && echo "E2E_DB_URL set" || (echo "E2E_DB_URL missing" && exit 1)

      - name: Allow Docker to stabilize
        run: sleep 20

      - name: Show Docker containers (before run)
        run: docker ps -a || true

      - name: Run E2E tests
        id: e2e_run
        continue-on-error: true
        run: xvfb-run mvn -B -Pe2e-tests verify -e -DforkCount=1 -DreuseForks=false

      - name: Debug MySQL container
        if: always()
        run: |
          echo "=== docker ps -a ==="
          docker ps -a || true
          echo "=== inspect mysql-e2e ==="
          docker inspect mysql-e2e || true
          echo "=== mysql-e2e logs ==="
          docker logs mysql-e2e || true

      - name: Fail job if E2E failed
        if: steps.e2e_run.outcome != 'success'
        run: exit 1
