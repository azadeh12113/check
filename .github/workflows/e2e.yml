name: E2E Tests

on:
  pull_request:
  push:

jobs:
  e2e:
    runs-on: ubuntu-latest

    env:
      E2E_DB_URL: ${{ secrets.E2E_DB_URL }}
      E2E_DB_USER: ${{ secrets.E2E_DB_USER }}
      E2E_DB_PASS: ${{ secrets.E2E_DB_PASS }}
      MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
      MYSQL_USER: ${{ secrets.MYSQL_USER }}
      MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
      MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Check env presence
        run: |
          test -n "$MYSQL_ROOT_PASSWORD" && echo "MYSQL_ROOT_PASSWORD set" || (echo "MYSQL_ROOT_PASSWORD missing" && exit 1)
          test -n "$MYSQL_DATABASE" && echo "MYSQL_DATABASE set" || (echo "MYSQL_DATABASE missing" && exit 1)
          test -n "$E2E_DB_URL" && echo "E2E_DB_URL set" || (echo "E2E_DB_URL missing" && exit 1)

      - name: Run E2E tests
        run: xvfb-run mvn -B -Pe2e-tests verify -e
