name: Coverage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build, generate JaCoCo, and upload to Coveralls
        run: mvn clean verify -Pjacoco coveralls:report -DrepoToken=${COVERALLS_REPO_TOKEN}
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_TOKEN }}

      - name: Check JaCoCo report exists
        run: ls -l target/site/jacoco/jacoco.xml

      - name: Verify excluded classes are not in JaCoCo
        run: |
          ! grep -i "com/example/artwork/client/ScoringClient" target/site/jacoco/jacoco.xml
          ! grep -i "com/example/artwork/dto/ScoreRequest" target/site/jacoco/jacoco.xml
