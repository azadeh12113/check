name: Coverage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build and generate coverage
        run: mvn clean verify

      - name: Check JaCoCo report exists
        run: ls -l target/site/jacoco/jacoco.xml

      # 🔍 DEBUG (optional but useful first time)
      - name: Print paths from JaCoCo
        run: grep -i "ScoringClient" target/site/jacoco/jacoco.xml || true

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: target/site/jacoco/jacoco.xml
          format: jacoco
          base-path: src/main/java   # ⭐ THIS IS THE FIX
